version: '3.8'

services:
  ffmpeg-mcp:
    image: ${TCR_REGISTRY}/${NAME_SPACE}/${REPO}:${IMAGE_TAG:-latest}
    container_name: ffmpeg-mcp-server
    ports:
      - "${MCP_PORT:-8032}:8032"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8032
      - MCP_EXTERNAL_URL=${MCP_EXTERNAL_URL:-http://localhost:8032}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_ALLOWED_HOSTS=*
      - MCP_ENABLE_DNS_REBINDING_PROTECTION=false
      - FASTMCP_TRANSPORT_SECURITY__ENABLE_DNS_REBINDING_PROTECTION=false
      - FASTMCP_TRANSPORT_SECURITY__ALLOWED_HOSTS=["*"]
    volumes:
      - ${VIDEOS_DIR:-./videos}:/videos
      - ${OUTPUT_DIR:-./output}:/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - app-network

networks:
  app-network:
    external: true
