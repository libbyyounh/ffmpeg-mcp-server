name: Build and Push FFmpeg MCP Server

on:
  push:
    tags:
      - 'v*'
      - 'latest'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.TCR_REGISTRY }}/${{ secrets.NAME_SPACE }}/${{ secrets.REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/tags/latest' }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Deploy to Cloud Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            set -e

            cd ${{ secrets.APP_PATH }}

            echo "${{ secrets.TCR_PASSWORD }}" | docker login \
              --username=${{ secrets.TCR_USERNAME }} \
              --password-stdin ${{ secrets.TCR_REGISTRY }}

            docker compose pull ffmpeg-mcp
            docker compose up -d ffmpeg-mcp
            docker image prune -f

            docker ps | grep ffmpeg-mcp